<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- ノードの影用フィルタ -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- 背景なし (透過) -->

  <!-- 相関図のエッジ（線） -->
  <!-- 中心へつながる線 -->
  <line x1="256" y1="120" x2="256" y2="280" stroke="#424242" stroke-width="12" stroke-linecap="round" />
  <line x1="256" y1="280" x2="120" y2="360" stroke="#424242" stroke-width="12" stroke-linecap="round" />
  <line x1="256" y1="280" x2="392" y2="360" stroke="#424242" stroke-width="12" stroke-linecap="round" />

  <!-- 中心ノード (小さな関係性のハブ) -->
  <circle cx="256" cy="280" r="16" fill="#424242" />

  <!-- ノード 1 (上部) -->
  <circle cx="256" cy="120" r="64" fill="#FFFFFF" stroke="#424242" stroke-width="8" filter="url(#shadow)" />
  <g transform="translate(224, 88) scale(2.666)" fill="#424242">
    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
  </g>

  <!-- ノード 2 (左下) -->
  <circle cx="120" cy="360" r="64" fill="#FFFFFF" stroke="#424242" stroke-width="8" filter="url(#shadow)" />
  <g transform="translate(88, 328) scale(2.666)" fill="#424242">
    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
  </g>

  <!-- ノード 3 (右下) -->
  <circle cx="392" cy="360" r="64" fill="#FFFFFF" stroke="#424242" stroke-width="8" filter="url(#shadow)" />
  <g transform="translate(360, 328) scale(2.666)" fill="#424242">
    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
  </g>
</svg>
